# OMB-equivalent consumer that drains the load-test topic at producer
# rate. Runs in a single consumer-group ("omb-consumer") so we can see
# the lag from any cluster via `rpk group describe`. See omb/README.md.
apiVersion: batch/v1
kind: Job
metadata:
  name: omb-consumer
  namespace: redpanda
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: tls
          secret:
            secretName: redpanda-default-cert
            items:
              - key: ca.crt
                path: ca.crt
        - name: consumer-config
          configMap:
            name: omb-consumer-config
      containers:
        - name: consumer
          image: apache/kafka:3.8.0
          volumeMounts:
            - name: tls
              mountPath: /etc/tls/redpanda
              readOnly: true
            - name: consumer-config
              mountPath: /etc/kafka/consumer.properties
              subPath: consumer.properties
              readOnly: true
          command:
            - /bin/bash
            - -ec
            - |
              for i in $(seq 1 30); do
                getent hosts redpanda.redpanda.svc.cluster.local && break
                sleep 2
              done
              exec /opt/kafka/bin/kafka-consumer-perf-test.sh \
                --topic load-test \
                --messages 100000000 \
                --reporting-interval 5000 \
                --show-detailed-stats \
                --group omb-consumer \
                --timeout 600000 \
                --consumer.config /etc/kafka/consumer.properties \
                --bootstrap-server redpanda.redpanda.svc.cluster.local:9093
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: omb-consumer-config
  namespace: redpanda
data:
  consumer.properties: |
    security.protocol=SSL
    ssl.truststore.type=PEM
    ssl.truststore.location=/etc/tls/redpanda/ca.crt
    ssl.endpoint.identification.algorithm=
    group.id=omb-consumer
    auto.offset.reset=earliest
    enable.auto.commit=true
    auto.commit.interval.ms=5000

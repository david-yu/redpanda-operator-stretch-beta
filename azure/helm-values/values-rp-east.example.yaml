# Helm values for cluster rp-east. Each cluster gets a per-cluster file
# because multicluster.name and apiServerExternalAddress differ per cluster;
# the multicluster.peers block is identical on every cluster.
#
# Replace the <PLACEHOLDER> values before installing:
#   - <RP_EAST_API_SERVER>: AKS API server FQDN — note the https:// prefix:
#       https://$(az aks show -n rp-east -g rp-east-rg --query fqdn -o tsv)
#   - <RP_EAST_NLB_HOSTNAME>: IP address of the rp-east-multicluster-peer LoadBalancer Service.
#     (Despite the "_HOSTNAME" suffix; the Azure internal LB exposes an IP, not a DNS name —
#     the placeholder name is shared with AWS templates for symmetry.)
#       kubectl --context rp-east -n redpanda get svc rp-east-multicluster-peer \
#         -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
#   - <RP_WEST_NLB_HOSTNAME>: same lookup against the rp-west cluster
#   - <RP_EU_NLB_HOSTNAME>:   same lookup against the rp-eu cluster

fullnameOverride: rp-east

enterprise:
  licenseSecretRef:
    name: redpanda-license
    key: license.key

crds:
  enabled: true

multicluster:
  enabled: true
  name: rp-east
  apiServerExternalAddress: <RP_EAST_API_SERVER>
  peers:
    - name: rp-east
      address: <RP_EAST_NLB_HOSTNAME>
    - name: rp-west
      address: <RP_WEST_NLB_HOSTNAME>
    - name: rp-eu
      address: <RP_EU_NLB_HOSTNAME>
  service:
    enabled: false

# Operator-level PVCUnbinder: when a broker pod stays Pending longer than
# `--unbind-pvcs-after`, the operator retains the PV and deletes the PVC
# so the StatefulSet can reschedule with a fresh disk. Triggers on real
# storage loss — Node deletion that breaks PV nodeAffinity, hardware
# failure, full AKS / EKS / GKE cluster recreate.
#
# It does NOT fire for `az aks stop`/`start` (or equivalent) where the
# managed disks survive intact: the new pods bind to the same PVCs on
# new nodes, never sit Pending, and instead crashloop on `bad_rejoin`
# (the broker's persisted node_uuid was decommissioned). For that
# scenario the recovery is manual `kubectl delete pvc + pod --force`,
# tracked upstream as redpanda-operator#1494.
#
# Docs: https://docs.redpanda.com/current/manage/kubernetes/k-nodewatcher/
#
# WARNING: per Redpanda's docs, this is "emergency only". A pod that
# stays Pending for any reason (slow scheduling, node-pool resize, image
# pull stalls) will lose its PV after the timeout. Raise the duration
# substantially or remove the flag entirely for production.
additionalCmdFlags:
  - --unbind-pvcs-after=120s
  - --allow-pv-rebinding
